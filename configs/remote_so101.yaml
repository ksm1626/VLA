# A6000-side RemoteSO101Robot + official LeRobot RobotClient config.

bridge:
  id: default
  host: 127.0.0.1
  port: 49100

robot:
  id: remote_so101_mock
  sensor_timeout_s: 2.0
  image_width: 256
  image_height: 256
  image_channels: 3
  front_camera_key: camera1
  top_camera_key: camera2
  joint_names:
    - shoulder_pan
    - shoulder_lift
    - elbow_flex
    - wrist_flex
    - wrist_roll
    - gripper
  unit_adapter:
    enabled: true
    arm_joint_names:
      - shoulder_pan
      - shoulder_lift
      - elbow_flex
      - wrist_flex
      - wrist_roll
    gripper_joint_name: gripper
    gripper_action_mode: linear
    gripper_policy_min: 0.0
    gripper_policy_max: 33.0
    gripper_ros_closed: 0.0
    gripper_ros_open: 0.8
    gripper_ros_min: -0.174533
    gripper_ros_max: 1.74533

policy:
  server_address: 127.0.0.1:8080
  policy_type: smolvla
  pretrained_name_or_path: outputs/train/smolvla_so101_v2/checkpoints/020000/pretrained_model
  policy_device: cuda
  client_device: cpu
  actions_per_chunk: 30
  chunk_size_threshold: 0.6
  # aggregate_fn_name: latest_only
  aggregate_fn_name: weighted_average
  # latest_only      새 chunk가 오면 새 action 우선
  # weighted_average 기존 action 30%, 새 action 70%
  # average          기존 action 50%, 새 action 50%
  # conservative     기존 action 70%, 새 action 30%

runtime:
  fps: 10
  task: Pick up the green object and place it in the black bin
  duration_s: 60.0
  max_steps: 600
  stop_after_actions: 0
