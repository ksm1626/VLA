# Pi0.5 policy server config.
# The LeRobot async PolicyServer only needs host/port at startup.
# Policy checkpoint/device/chunk settings are sent later by RobotClient handshake.

server:
  host: 0.0.0.0
  port: 8080

client_handshake_defaults:
  policy_type: pi05
  pretrained_name_or_path: outputs/train/pi05_so101_v1/checkpoints/005000/pretrained_model
  policy_device: cuda
  actions_per_chunk: 50
  chunk_size_threshold: 0.6
  aggregate_fn_name: weighted_average
